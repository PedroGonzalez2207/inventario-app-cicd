apiVersion: apps/v1
kind: Deployment
metadata:
  name: inventario-app-canary
spec:
  replicas: 1
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxUnavailable: 1
      maxSurge: 1
  selector:
    matchLabels:
      app: inventario-app-canary
      track: canary
  template:
    metadata:
      labels:
        app: inventario-app-canary
        track: canary
    spec:
      containers:
        - name: inventario-app-canary
          image: ghcr.io/pedrogonzalez2207/inventario-app-cicd:latest
          imagePullPolicy: Always
          ports:
            - name: http
              containerPort: 3000
          env:
            - name: APP_VERSION
              value: "v2"
            - name: APP_COLOR
              value: "canary"
            - name: STARTUP_DELAY_SECONDS
              value: "15"
            - name: API_KEY
              valueFrom:
                secretKeyRef:
                  name: inventario-app-secret
                  key: API_KEY
          readinessProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 3
            periodSeconds: 5
            timeoutSeconds: 2
            failureThreshold: 6
          livenessProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 15
            periodSeconds: 10
            timeoutSeconds: 2
            failureThreshold: 3
